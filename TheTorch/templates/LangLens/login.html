{% extends "LangLens/index.html" %}

     {% block css %}
    {% load static %}

     <link rel="stylesheet" href="{% static 'LangLens/css/login_snigup.css' %}">

    {% endblock %} 
     {% block content %}

        <div class="all">
    <div class="auth-wrapper">
        <div class="logo">LANG<span>LENS</span></div>

        <div class="auth-container">
            <div class="auth-card" id="login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your workspace.</p>
                
                <form>
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <p class="toggle-text">Don't have an account? <a href="{% url 'signup' %}">Sign up for free</a></p>
            </div>
        </div>
    </div>
    </div>
    {% endblock %}
