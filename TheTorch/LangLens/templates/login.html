<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Your Account</title>
    <link rel="stylesheet" href="auth-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="logo">LANG<span>LENS</span></div>

        <div class="auth-container">
            <div class="auth-card" id="login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your workspace.</p>
                
                <form>
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <p class="toggle-text">Don't have an account? <a href="#">Sign up for free</a></p>
            </div>
        </div>
    </div>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-color: #f8fafc; /* Matches home page */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.auth-wrapper {
    width: 100%;
    max-width: 420px;
    text-align: center;
}

/* Reusing Logo Styles */
.logo {
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 2rem;
    color: #1e293b;
}
.logo span { color: #3b82f6; }

/* The Card */
.auth-card {
    background: white;
    padding: 2.5rem;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    text-align: left;
}

h2 {
    color: #1e293b;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}

.subtitle {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 2rem;
}

/* Input Fields */
.input-group {
    margin-bottom: 1.5rem;
}

.input-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #475569;
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.input-wrapper i {
    position: absolute;
    left: 1rem;
    color: #94a3b8;
}

.input-wrapper input {
    width: 100%;
    padding: 0.8rem 1rem 0.8rem 2.8rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.3s;
}

.input-wrapper input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* Form Extras */
.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-bottom: 2rem;
    color: #64748b;
}

.form-options a {
    color: #3b82f6;
    text-decoration: none;
}

/* Main Button */
.btn-primary {
    width: 100%;
    padding: 0.8rem;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-primary:hover {
    background: #2563eb;
}

.toggle-text {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.9rem;
    color: #64748b;
}

.toggle-text a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
}
</style>
</body>
</html>
